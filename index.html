<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Árbol Binario con Flexbox y Líneas</title>
    <link href="./bootstrap-5.3.8-dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container py-5">
        <div class="text-center mb-5">
            <h1 class="fw-bold text-info">Estructura de Datos Avanzada</h1>
            <p class="text-muted">Árbol Binario Autodistribuido con Líneas CSS Automáticas</p>
        </div>

        <div class="row g-4">
            <div class="col-md-4">
                <div class="card card-custom p-4 h-100">
                    <h5 class="card-title mb-4 text-info">Controles de la Aplicación</h5>

                    <div class="mb-4">
                        <label class="form-label text-light fw-semibold">Ingresar nodo:</label>
                        <div class="input-group">
                            <input type="text" class="form-control bg-dark text-white border-secondary"
                                placeholder="Ej. A, B...">
                            <button class="btn btn-info text-dark fw-bold px-3">Guardar</button>
                        </div>
                    </div>

                    <hr class="text-secondary my-4">

                    <div class="mb-4">
                        <label class="form-label text-light fw-semibold">Buscar por InOrden:</label>
                        <input type="text" class="form-control bg-dark text-white border-secondary mb-3"
                            placeholder="Ej. F" value="F">

                        <div class="d-flex gap-2 justify-content-end">
                            <button class="btn btn-outline-secondary px-3">Limpiar</button>
                            <button class="btn btn-success fw-bold px-4">Buscar</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card card-custom p-4">
                    <h5 class="card-title mb-3 text-light">Lienzo con Conexiones Automáticas</h5>

                    <div class="canvas-arbol">

                        <ul class="arbol">
                            <li>
                                <div class="nodo-wrapper">
                                    <div class="nodo-circulo nodo-azul">A</div>
                                </div>

                                <ul>
                                    <li>
                                        <div class="nodo-wrapper">
                                            <div class="nodo-circulo nodo-azul">B</div>
                                        </div>
                                        <ul>
                                            <li>
                                                <div class="nodo-wrapper">
                                                    <div class="nodo-circulo nodo-verde">D</div>
                                                </div>
                                            </li>
                                            <li>
                                                <div class="nodo-wrapper">
                                                    <div class="nodo-circulo nodo-rojo">E</div>
                                                </div>
                                            </li>
                                        </ul>
                                    </li>

                                    <li>
                                        <div class="nodo-wrapper">
                                            <div class="nodo-circulo nodo-azul">C</div>
                                        </div>
                                        <ul>
                                            <li>
                                                <div class="nodo-wrapper">
                                                    <div class="nodo-vacio"></div>
                                                </div>
                                            </li>
                                            <li>
                                                <div class="nodo-wrapper">
                                                    <div class="nodo-circulo nodo-objetivo">F</div>
                                                </div>
                                            </li>
                                        </ul>
                                    </li>
                                </ul>
                            </li>
                        </ul>

                    </div>

                    <div class="mt-4">
                        <h6 class="text-muted text-uppercase small fw-bold mb-2">Recorrido final en pantalla:</h6>
                        <div class="resultado-box p-3 rounded text-success fw-bold text-center">
                            D, B, E, A, C, F
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="./bootstrap-5.3.8-dist/js/bootstrap.min.js"></script>

</body>

</html>
